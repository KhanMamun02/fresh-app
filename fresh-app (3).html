<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fresh">
<meta name="theme-color" content="#111">
<title>Fresh — Food Safety Logos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:#F0EDE7;color:#111;
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
  overscroll-behavior:none}
button,input,textarea{font-family:inherit}
button{cursor:pointer;border:none;background:none}
input,textarea{-webkit-appearance:none;appearance:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#C8C0B4;border-radius:99px}

:root{
  --bg:#F0EDE7;--s:#fff;--bd:#DDD8CF;
  --ink:#111;--ink2:#555;--ink3:#999;
  --r:10px;--r2:6px;
  --green:#145214;--gbg:#E8F5E8;--gbd:#7CC07C;
  --amber:#7A4800;--abg:#FFF3D0;--abd:#E8B040;
  --red:#8B1111;--rbg:#FDE8E8;--rbd:#D07070;
  --shadow:0 1px 8px rgba(0,0,0,.08);
  --shadow-lg:0 6px 28px rgba(0,0,0,.14);
}

/* Shell */
#shell{display:flex;flex-direction:column;height:100dvh;max-width:580px;margin:0 auto}

/* Header */
#hdr{background:#111;color:#fff;flex-shrink:0;
  padding:0 16px;padding-top:env(safe-area-inset-top,0px)}
#hdr-row{height:52px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:9px}
.logo-sq{width:32px;height:32px;background:rgba(255,255,255,.1);border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:16px}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-.03em}
.brand-tag{font-size:7.5px;opacity:.4;letter-spacing:.12em;text-transform:uppercase;margin-top:-2px}
.hdr-r{display:flex;align-items:center;gap:8px}
#apill{background:#C62828;color:#fff;font-size:10px;font-weight:700;
  padding:2px 9px;border-radius:99px;display:none}
#apill.on{display:block}
.hdr-btn{background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:6px;
  padding:5px 11px;font-size:12px;font-weight:500;cursor:pointer}

/* Tabs */
#tabs{background:#fff;border-bottom:1.5px solid var(--bd);display:flex;
  overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tb{border:none;background:none;padding:12px 14px;font-size:11.5px;font-weight:500;
  color:var(--ink3);border-bottom:2.5px solid transparent;white-space:nowrap;
  cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s;flex-shrink:0}
.tb.on{color:#111;border-bottom-color:#111;font-weight:700}

/* Page */
#page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px;padding-bottom:36px}
.fade{animation:fu .2s ease both}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Cards */
.card{background:#fff;border:1.5px solid var(--bd);border-radius:var(--r);overflow:hidden}
.card-hd{padding:11px 14px;border-bottom:1px solid var(--bd);
  display:flex;justify-content:space-between;align-items:center;
  font-weight:600;font-size:13px}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;
  cursor:pointer;font-family:inherit;font-weight:700;
  border-radius:var(--r2);border:none;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-blk{background:#111;color:#fff;font-size:14px;padding:13px;width:100%}
.btn-blk:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-out{background:#fff;color:#111;border:1.5px solid var(--bd);font-size:14px;padding:12px;width:100%}
.btn-out:hover{background:var(--bg)}
.btn-ghost{background:none;border:none;color:var(--ink2);font-size:12px;
  padding:6px 10px;border-radius:6px;cursor:pointer}

/* Form */
.field{width:100%;padding:11px 13px;border-radius:var(--r2);border:1.5px solid var(--bd);
  font-size:14px;background:#fff;color:#111;outline:none;transition:.15s}
.field:focus{border-color:#111}
textarea.field{resize:none}
.lbl{font-size:11px;font-weight:600;color:var(--ink2);margin-bottom:6px;
  display:block;text-transform:uppercase;letter-spacing:.05em}

/* Freshness */
.fbar{background:#E5E0D5;border-radius:99px;overflow:hidden;width:100%}
.fbar-fill{height:100%;border-radius:99px;transition:width .4s}

/* Badges */
.badge{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:99px}
.b-fr{background:var(--gbg);color:var(--green)}
.b-so{background:var(--abg);color:var(--amber)}
.b-cr,.b-ex{background:var(--rbg);color:var(--red)}

/* Summary */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.sum-card{border-radius:var(--r);padding:13px 14px}
.sum-lbl{font-size:10px;font-weight:600;opacity:.6;margin-bottom:3px;
  text-transform:uppercase;letter-spacing:.05em}
.sum-val{font-size:30px;font-weight:800;line-height:1.05}

/* Priority rows */
.prow{padding:10px 13px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--bd)}
.prow:last-child{border-bottom:none}

/* Inventory rows */
.irow{padding:12px 13px;border-bottom:1px solid var(--bd);
  border-left:4px solid transparent}
.irow:last-child{border-bottom:none}

/* Drop zone */
.dz{border:2px dashed var(--bd);border-radius:var(--r);padding:28px 20px;
  text-align:center;cursor:pointer;transition:.2s;background:#fff;position:relative}
.dz:hover,.dz.drag{border-color:#111;background:#EAE7E0}
.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* Match box */
.match-box{border-radius:var(--r);padding:16px;margin-top:13px;
  animation:popIn .25s ease}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.match-ok{background:var(--gbg);border:1.5px solid var(--gbd)}
.match-fail{background:var(--rbg);border:1.5px solid var(--rbd)}

/* Overlay / Sheet */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;
  display:flex;align-items:flex-end;justify-content:center}
.ov.mid{align-items:center;padding:20px}
.sheet{background:#fff;border-radius:20px 20px 0 0;max-height:92vh;
  overflow-y:auto;width:100%;max-width:580px;animation:slideUp .24s ease}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet.modal{border-radius:15px;max-height:88vh;max-width:490px;animation:popIn .2s ease}
.sh-hd{padding:15px 18px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:#fff;z-index:5;border-radius:20px 20px 0 0}
.sh-title{font-size:16px;font-weight:700}
.sh-x{font-size:22px;color:var(--ink3);background:none;border:none;
  cursor:pointer;line-height:1;padding:2px 6px;border-radius:5px}
.sh-x:hover{background:#f0ede7}
.sh-body{padding:18px}
.sh-foot{padding:12px 18px;border-top:1px solid var(--bd);background:#fff;
  position:sticky;bottom:0;display:flex;flex-direction:column;gap:8px;
  padding-bottom:max(12px,env(safe-area-inset-bottom))}

/* Entry steps */
.step-bar{display:flex;gap:4px;margin-bottom:14px}
.step-bar div{flex:1;height:3px;border-radius:99px;background:var(--bd);transition:.3s}
.step-bar div.on{background:#111}
.cat-opt{display:flex;align-items:center;gap:10px;padding:11px 13px;
  border-radius:9px;border:1.5px solid var(--bd);background:#fff;
  cursor:pointer;margin-bottom:8px;transition:.15s}
.cat-opt.sel{border-color:var(--cc,#111);background:var(--cb,#eee)}
.cat-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--cc,var(--bd));
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.cat-opt.sel .cat-radio{background:var(--cc);border-color:var(--cc)}
.cat-opt.sel .cat-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff}
.day-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.day-btn{padding:11px 0;border:1.5px solid var(--bd);background:#fff;
  color:var(--ink2);border-radius:9px;font-size:16px;font-weight:700;cursor:pointer;transition:.15s}
.day-btn.sel{border-color:#111;background:#111;color:#fff}

/* Toast */
#toast{position:fixed;top:max(env(safe-area-inset-top,0px),14px);left:50%;
  transform:translateX(-50%);padding:10px 20px;border-radius:99px;
  font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);z-index:9999;
  pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;max-width:92vw}
#toast.on{opacity:1}

/* Pills */
.pills{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:1px}
.pills::-webkit-scrollbar{display:none}
.pill{border:1.5px solid var(--bd);background:#fff;color:var(--ink2);
  padding:4px 12px;border-radius:99px;font-size:11px;font-weight:500;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:.15s}
.pill.on{background:#111;color:#fff;border-color:#111}

/* Spinner */
.spin{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.25);
  border-top-color:#fff;border-radius:50%;animation:ro .7s linear infinite}
@keyframes ro{to{transform:rotate(360deg)}}
.spin.dk{border-color:rgba(0,0,0,.1);border-top-color:#111}

/* Section label */
.sec{font-size:10.5px;font-weight:700;color:var(--ink2);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}

/* Logo card in logos tab */
.logo-card{background:#fff;border:1.5px solid var(--bd);border-radius:var(--r);
  padding:14px;display:flex;flex-direction:column;gap:10px}
.logo-canvas-wrap{background:#fff;border:2px solid #111;border-radius:8px;
  overflow:hidden;display:flex;align-items:center;justify-content:center;padding:4px}
.logo-canvas{display:block;image-rendering:pixelated}

/* Print styles */
@media print{
  /* Hide everything except the dedicated print page */
  body > *:not(#print-page){display:none!important}
  #print-page{display:block!important}
  body{background:#fff;margin:0;padding:0}
  #pgrid{
    display:grid!important;
    grid-template-columns:repeat(4,1fr)!important;
    gap:5mm!important;
    padding:8mm!important;
  }
  .pcard{page-break-inside:avoid;border:1.5px solid #111!important}
  @page{size:A4 portrait;margin:6mm}
}
/* Print page hidden by default, shown only during print or preview */
#print-page{display:none;background:#fff}
</style>
</head>
<body>
<div id="shell">
  <div id="hdr">
    <div id="hdr-row">
      <div class="brand">
        <div class="logo-sq">🥗</div>
        <div>
          <div class="brand-name">Fresh</div>
          <div class="brand-tag">Food Safety · Logo Edition</div>
        </div>
      </div>
      <div class="hdr-r">
        <div id="apill">⚠ <span id="acnt">0</span></div>
        <button class="hdr-btn" onclick="openAuth()">👤</button>
      </div>
    </div>
  </div>

  <div id="tabs">
    <button class="tb on" id="tb-dash"   onclick="gTab('dash')">📊 Dashboard</button>
    <button class="tb"    id="tb-scan"   onclick="gTab('scan')">📷 Scan</button>
    <button class="tb"    id="tb-inv"    onclick="gTab('inv')">📋 Inventory</button>
    <button class="tb"    id="tb-logos"  onclick="gTab('logos')">🎨 Logos</button>
    <button class="tb"    id="tb-set"    onclick="gTab('set')">⚙️ Settings</button>
  </div>

  <div id="page"></div>
</div>

<canvas id="work-cv" style="display:none"></canvas>
<div id="toast"></div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════════
   LOGO ENGINE
   Generates 20 unique, high-contrast, easily-photographable logos.
   Each logo is rendered as a crisp SVG-like canvas drawing.

   Design system:
   ┌────────────────────────────────────────────────────────────────┐
   │  OUTER BORDER SHAPE  (4 rotating: circle/square/hex/diamond)  │
   │  ┌────────────────────────────────────────────────────────┐   │
   │  │  LARGE STATION NUMBER  (01–20)  →  dominant element   │   │
   │  │  UNIQUE ICON  (top-right corner)  →  visual anchor    │   │
   │  │  STATION NAME  (bottom)  →  text label                │   │
   │  └────────────────────────────────────────────────────────┘   │
   └────────────────────────────────────────────────────────────────┘

   Identification strategy:
   - Large bold number (01–20) is the primary unique element
   - Visual icon provides fast human recognition
   - Border shape groups stations visually
   - Photo matching uses pixel correlation of rendered reference images
   ═══════════════════════════════════════════════════════════════════ */
const LogoEngine = (() => {

  // Station definitions: id, number, name, icon path (SVG-like canvas commands), border style
  const STATIONS = [
    { id:'F01', num:'01', name:'KITCHEN A',   icon:'knife',    border:'circle',  inv:false },
    { id:'F02', num:'02', name:'KITCHEN B',   icon:'flame',    border:'square',  inv:true  },
    { id:'F03', num:'03', name:'PREP 1',      icon:'board',    border:'hex',     inv:false },
    { id:'F04', num:'04', name:'PREP 2',      icon:'ladle',    border:'diamond', inv:true  },
    { id:'F05', num:'05', name:'FRIDGE 1',    icon:'snowflake',border:'circle',  inv:true  },
    { id:'F06', num:'06', name:'FRIDGE 2',    icon:'drop',     border:'square',  inv:false },
    { id:'F07', num:'07', name:'FREEZER',     icon:'crystal',  border:'hex',     inv:true  },
    { id:'F08', num:'08', name:'DRY STORE',   icon:'box',      border:'diamond', inv:false },
    { id:'F09', num:'09', name:'HOT HOLD',    icon:'heat',     border:'circle',  inv:false },
    { id:'F10', num:'10', name:'COLD HOLD',   icon:'ice',      border:'square',  inv:true  },
    { id:'F11', num:'11', name:'PANTRY',      icon:'jar',      border:'hex',     inv:false },
    { id:'F12', num:'12', name:'BAKERY',      icon:'wheat',    border:'diamond', inv:true  },
    { id:'F13', num:'13', name:'GRILL',       icon:'fire',     border:'circle',  inv:true  },
    { id:'F14', num:'14', name:'SALAD BAR',   icon:'leaf',     border:'square',  inv:false },
    { id:'F15', num:'15', name:'RECEIVING',   icon:'truck',    border:'hex',     inv:true  },
    { id:'F16', num:'16', name:'SERVICE',     icon:'star',     border:'diamond', inv:false },
    { id:'F17', num:'17', name:'MEAT',        icon:'cross',    border:'circle',  inv:false },
    { id:'F18', num:'18', name:'SEAFOOD',     icon:'wave',     border:'square',  inv:true  },
    { id:'F19', num:'19', name:'VEG PREP',    icon:'sprout',   border:'hex',     inv:false },
    { id:'F20', num:'20', name:'DISPATCH',    icon:'arrow',    border:'diamond', inv:true  },
  ];

  // Draw a single icon shape on canvas context
  function drawIcon(ctx, iconName, cx, cy, size, dark) {
    const c = dark ? '#fff' : '#111';
    ctx.fillStyle = c;
    ctx.strokeStyle = c;
    ctx.lineWidth = Math.max(2, size * 0.15);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    const s = size * 0.42;

    ctx.beginPath();
    switch(iconName) {
      case 'knife':
        // Simple blade shape
        ctx.moveTo(cx-s*.1, cy-s);
        ctx.lineTo(cx+s*.4, cy-s*.2);
        ctx.lineTo(cx+s*.1, cy+s);
        ctx.lineTo(cx-s*.4, cy+s*.2);
        ctx.closePath(); ctx.fill(); break;

      case 'flame':
        ctx.moveTo(cx, cy+s);
        ctx.bezierCurveTo(cx-s, cy, cx-s*.5, cy-s*.5, cx, cy-s*.8);
        ctx.bezierCurveTo(cx+s*.2, cy-s*.4, cx+s*.1, cy-s*.1, cx+s*.3, cy-s*.6);
        ctx.bezierCurveTo(cx+s*.6, cy-.2, cx+s, cy, cx, cy+s);
        ctx.fill(); break;

      case 'board':
        // Cutting board rectangle
        ctx.roundRect(cx-s*.7, cy-s*.5, s*1.4, s, 3);
        ctx.fill();
        ctx.fillStyle = dark ? '#111' : '#fff';
        ctx.fillRect(cx-s*.4, cy-s*.25, s*.8, s*.08);
        ctx.fillRect(cx-s*.4, cy+s*.08, s*.8, s*.08); break;

      case 'ladle':
        // Spoon/ladle
        ctx.arc(cx, cy-s*.4, s*.45, 0, Math.PI*2); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(cx+s*.3, cy-s*.1);
        ctx.lineTo(cx+s*.1, cy+s*.8);
        ctx.lineWidth = size * 0.18;
        ctx.stroke(); break;

      case 'snowflake':
        // 6-pointed snowflake
        for(let i=0;i<6;i++){
          ctx.save();ctx.translate(cx,cy);ctx.rotate(i*Math.PI/3);
          ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-s);ctx.stroke();
          ctx.beginPath();ctx.moveTo(0,-s*.5);ctx.lineTo(-s*.3,-s*.65);ctx.stroke();
          ctx.beginPath();ctx.moveTo(0,-s*.5);ctx.lineTo(s*.3,-s*.65);ctx.stroke();
          ctx.restore();
        }
        ctx.beginPath();ctx.arc(cx,cy,s*.22,0,Math.PI*2);ctx.fill(); break;

      case 'drop':
        ctx.moveTo(cx, cy-s);
        ctx.bezierCurveTo(cx+s*.6, cy-s*.2, cx+s*.6, cy+s*.4, cx, cy+s);
        ctx.bezierCurveTo(cx-s*.6, cy+s*.4, cx-s*.6, cy-s*.2, cx, cy-s);
        ctx.fill(); break;

      case 'crystal':
        // Diamond/gem
        ctx.moveTo(cx, cy-s);ctx.lineTo(cx+s*.7, cy);
        ctx.lineTo(cx, cy+s*.9);ctx.lineTo(cx-s*.7, cy);ctx.closePath();ctx.fill();
        ctx.fillStyle = dark?'#111':'#fff';
        ctx.beginPath();ctx.moveTo(cx,cy-s*.6);ctx.lineTo(cx+s*.4,cy);ctx.lineTo(cx-s*.4,cy);ctx.fill();
        break;

      case 'box':
        ctx.strokeRect(cx-s*.7, cy-s*.5, s*1.4, s*1.0);
        ctx.moveTo(cx-s*.7, cy-s*.1);ctx.lineTo(cx+s*.7,cy-s*.1);ctx.stroke();
        ctx.moveTo(cx, cy-s*.5);ctx.lineTo(cx, cy-s*.1);ctx.stroke(); break;

      case 'heat':
        // 3 rising waves = heat lines
        for(let i=-1;i<=1;i++){
          ctx.beginPath();
          ctx.moveTo(cx+i*s*.35, cy+s*.5);
          ctx.bezierCurveTo(cx+i*s*.35-s*.15,cy+s*.1,cx+i*s*.35+s*.15,cy-s*.3,cx+i*s*.35,cy-s*.7);
          ctx.stroke();
        } break;

      case 'ice':
        // Snowflake variant with square center
        ctx.fillRect(cx-s*.25, cy-s*.25, s*.5, s*.5);
        for(let i=0;i<4;i++){
          ctx.save();ctx.translate(cx,cy);ctx.rotate(i*Math.PI/2);
          ctx.beginPath();ctx.moveTo(0,-s*.3);ctx.lineTo(0,-s*.9);ctx.stroke();
          ctx.restore();
        } break;

      case 'jar':
        // Mason jar outline
        ctx.beginPath();
        ctx.moveTo(cx-s*.5,cy-s*.7);ctx.lineTo(cx-s*.6,cy+s*.9);
        ctx.lineTo(cx+s*.6,cy+s*.9);ctx.lineTo(cx+s*.5,cy-s*.7);ctx.closePath();ctx.fill();
        ctx.beginPath();
        ctx.fillStyle=dark?'#111':'#fff';
        ctx.fillRect(cx-s*.6,cy-s*.95,s*1.2,s*.3);
        ctx.beginPath();ctx.fillRect(cx-s*.35,cy-s*.2,s*.7,s*.08);
        break;

      case 'wheat':
        // Wheat stalk
        ctx.moveTo(cx,cy+s);ctx.lineTo(cx,cy-s*.2);ctx.stroke();
        for(let i=0;i<3;i++){
          const yy=cy-s*.2+i*s*.4;
          ctx.beginPath();ctx.moveTo(cx,yy);ctx.lineTo(cx-s*.55,yy-s*.35);ctx.stroke();
          ctx.beginPath();ctx.moveTo(cx,yy);ctx.lineTo(cx+s*.55,yy-s*.35);ctx.stroke();
        }
        ctx.beginPath();ctx.arc(cx,cy-s*.9,s*.25,0,Math.PI*2);ctx.fill(); break;

      case 'fire':
        // Multiple flames
        ctx.moveTo(cx,cy+s);
        ctx.bezierCurveTo(cx-s*.8,cy+s*.2,cx-s*.5,cy-s*.3,cx-s*.1,cy-s*.5);
        ctx.bezierCurveTo(cx-s*.3,cy-s*.1,cx-s*.1,cy+s*.2,cx,cy);
        ctx.bezierCurveTo(cx+s*.1,cy-s*.4,cx+s*.4,cy-s*.7,cx+s*.2,cy-s);
        ctx.bezierCurveTo(cx+s*.6,cy-s*.5,cx+s*.9,cy,cx+s*.7,cy+s*.4);
        ctx.bezierCurveTo(cx+s*.8,cy+s,cx,cy+s*1.1,cx,cy+s);
        ctx.fill(); break;

      case 'leaf':
        ctx.moveTo(cx,cy+s*.8);
        ctx.bezierCurveTo(cx-s*.7,cy+s*.2,cx-s*.8,cy-s*.5,cx,cy-s*.9);
        ctx.bezierCurveTo(cx+s*.8,cy-s*.5,cx+s*.7,cy+s*.2,cx,cy+s*.8);
        ctx.fill();
        ctx.strokeStyle=dark?'#111':'#fff';
        ctx.beginPath();ctx.moveTo(cx,cy-s*.9);ctx.lineTo(cx,cy+s*.8);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+s*.5,cy-s*.3);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx,cy+s*.2);ctx.lineTo(cx-s*.45,cy-.1);ctx.stroke();
        break;

      case 'truck':
        // Simple truck side view
        ctx.fillRect(cx-s*.8,cy-s*.3,s*1.3,s*.7);
        ctx.fillStyle=dark?'#111':'#fff';
        ctx.fillRect(cx-s*.5,cy-s*.55,s*.5,s*.25);
        ctx.fillStyle=c;
        ctx.beginPath();ctx.arc(cx-s*.55,cy+s*.45,s*.22,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(cx+s*.35,cy+s*.45,s*.22,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=dark?'#111':'#fff';
        ctx.beginPath();ctx.arc(cx-s*.55,cy+s*.45,s*.1,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(cx+s*.35,cy+s*.45,s*.1,0,Math.PI*2);ctx.fill();
        break;

      case 'star':
        // 5-pointed star
        for(let i=0;i<5;i++){
          const a1=i*Math.PI*2/5-Math.PI/2;
          const a2=(i+.5)*Math.PI*2/5-Math.PI/2;
          const x1=cx+Math.cos(a1)*s, y1=cy+Math.sin(a1)*s;
          const x2=cx+Math.cos(a2)*s*.4, y2=cy+Math.sin(a2)*s*.4;
          if(i===0)ctx.moveTo(x1,y1); else ctx.lineTo(x1,y1);
          ctx.lineTo(x2,y2);
        }
        ctx.closePath();ctx.fill(); break;

      case 'cross':
        ctx.fillRect(cx-s*.22,cy-s,s*.44,s*2);
        ctx.fillRect(cx-s,cy-s*.22,s*2,s*.44); break;

      case 'wave':
        // Wave lines = seafood
        for(let i=-1;i<=1;i++){
          ctx.beginPath();
          const yy=cy+i*s*.38;
          ctx.moveTo(cx-s*.8,yy);
          ctx.bezierCurveTo(cx-s*.4,yy-s*.3,cx+s*.4,yy+s*.3,cx+s*.8,yy);
          ctx.stroke();
        } break;

      case 'sprout':
        // Plant sprout
        ctx.moveTo(cx,cy+s*.9);ctx.lineTo(cx,cy-s*.4);ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx,cy-s*.1);
        ctx.bezierCurveTo(cx,cy-s*.7,cx+s*.7,cy-s*.8,cx+s*.6,cy-s*.1);
        ctx.bezierCurveTo(cx+s*.4,cy+s*.1,cx+s*.1,cy+s*.1,cx,cy-s*.1);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(cx,cy+s*.2);
        ctx.bezierCurveTo(cx,cy-s*.4,cx-s*.7,cy-s*.5,cx-s*.55,cy+s*.1);
        ctx.bezierCurveTo(cx-s*.3,cy+s*.2,cx-s*.1,cy+s*.3,cx,cy+s*.2);
        ctx.fill(); break;

      case 'arrow':
        // Bold right arrow
        ctx.moveTo(cx-s*.8,cy-s*.25);ctx.lineTo(cx+s*.1,cy-s*.25);
        ctx.lineTo(cx+s*.1,cy-s*.6);ctx.lineTo(cx+s*.8,cy);
        ctx.lineTo(cx+s*.1,cy+s*.6);ctx.lineTo(cx+s*.1,cy+s*.25);
        ctx.lineTo(cx-s*.8,cy+s*.25);ctx.closePath();ctx.fill(); break;

      default:
        ctx.arc(cx,cy,s*.6,0,Math.PI*2);ctx.fill();
    }
  }

  // Draw the border shape (clip region)
  function drawBorderShape(ctx, border, cx, cy, r) {
    ctx.beginPath();
    switch(border) {
      case 'circle':
        ctx.arc(cx, cy, r, 0, Math.PI*2); break;
      case 'square':
        ctx.roundRect(cx-r, cy-r, r*2, r*2, r*0.12); break;
      case 'hex':
        for(let i=0;i<6;i++){
          const a=i*Math.PI/3-Math.PI/6;
          const x=cx+r*Math.cos(a), y=cy+r*Math.sin(a);
          i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.closePath(); break;
      case 'diamond':
        ctx.moveTo(cx, cy-r*1.05);
        ctx.lineTo(cx+r, cy);
        ctx.lineTo(cx, cy+r*1.05);
        ctx.lineTo(cx-r, cy);
        ctx.closePath(); break;
    }
  }

  // Render a single station logo to a canvas
  // Returns the canvas element
  function render(station, canvas, size = 200) {
    const dpr = 1; // caller handles dpr
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const inv = station.inv; // inverted = dark background
    const fg = inv ? '#fff' : '#111';
    const bg = inv ? '#111' : '#fff';
    const cx = size / 2, cy = size / 2;
    const r = size * 0.44;

    // Background
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, size, size);

    // Border shape fill
    drawBorderShape(ctx, station.border, cx, cy, r);
    ctx.fillStyle = bg;
    ctx.fill();

    // Border stroke (thick)
    drawBorderShape(ctx, station.border, cx, cy, r);
    ctx.strokeStyle = '#111';
    ctx.lineWidth = size * 0.045;
    ctx.stroke();

    // Large station number — primary identifier, centered
    const numSize = size * (station.num.length > 2 ? 0.34 : 0.4);
    ctx.fillStyle = fg;
    ctx.font = `900 ${numSize}px 'Inter', 'Arial Black', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Slight upward offset to leave room for name at bottom
    ctx.fillText(station.num, cx, cy * 0.88);

    // Station name at bottom inside shape
    const nameSize = size * 0.085;
    ctx.font = `700 ${nameSize}px 'Inter', Arial, sans-serif`;
    ctx.fillStyle = fg;
    ctx.fillText(station.name, cx, cy * 1.6);

    // Icon in top-right corner (inside shape)
    const iconSize = size * 0.2;
    const iconX = cx + r * 0.5;
    const iconY = cy - r * 0.52;
    drawIcon(ctx, station.icon, iconX, iconY, iconSize, inv);

    // Station ID tag bottom-right (small, monospace)
    ctx.font = `600 ${size * 0.065}px 'JetBrains Mono', 'Courier New', monospace`;
    ctx.fillStyle = fg;
    ctx.globalAlpha = 0.55;
    ctx.fillText(station.id, cx, cy * 1.82);
    ctx.globalAlpha = 1;

    return canvas;
  }

  // Render to an <img> src (data URL)
  function renderToImg(station, size = 200) {
    const cv = document.createElement('canvas');
    render(station, cv, size);
    return cv.toDataURL('image/png');
  }

  // Get pixel signature for matching (grayscale, downsampled to 32x32 = 1024 values)
  function getSignature(station, size = 96) {
    const cv = document.createElement('canvas');
    render(station, cv, size);
    const ctx = cv.getContext('2d');
    const data = ctx.getImageData(0, 0, size, size).data;
    const sig = new Float32Array(size * size);
    for (let i = 0; i < size * size; i++) {
      sig[i] = (data[i * 4] * 77 + data[i * 4 + 1] * 150 + data[i * 4 + 2] * 29) / (255 * 256);
    }
    return sig;
  }

  // Pearson correlation coefficient between two signatures
  function correlate(a, b) {
    const n = Math.min(a.length, b.length);
    let sA = 0, sB = 0;
    for (let i = 0; i < n; i++) { sA += a[i]; sB += b[i]; }
    const mA = sA / n, mB = sB / n;
    let cov = 0, vA = 0, vB = 0;
    for (let i = 0; i < n; i++) {
      const da = a[i] - mA, db = b[i] - mB;
      cov += da * db; vA += da * da; vB += db * db;
    }
    const denom = Math.sqrt(vA * vB);
    return denom < 1e-10 ? 0 : cov / denom;
  }

  return { STATIONS, render, renderToImg, getSignature, correlate };
})();

// Pre-compute all 20 reference signatures once at startup
let REF_SIGS = null;
function getRefSigs() {
  if (!REF_SIGS) {
    REF_SIGS = LogoEngine.STATIONS.map(s => ({
      station: s,
      sig: LogoEngine.getSignature(s, 64)
    }));
  }
  return REF_SIGS;
}


/* ═══════════════════════════════════════════════════════════════════════
   PHOTO MATCHER
   Finds the logo in an uploaded photo and matches it against all 20
   reference signatures using Pearson correlation.
   ═══════════════════════════════════════════════════════════════════════ */
const PhotoMatcher = (() => {

  // Convert a canvas region to grayscale signature (same size as reference)
  function regionToSig(ctx, sx, sy, sw, sh, sigSize) {
    // Render region to temp canvas at sigSize
    const tmp = document.createElement('canvas');
    tmp.width = sigSize; tmp.height = sigSize;
    const tCtx = tmp.getContext('2d');
    tCtx.drawImage(ctx.canvas, sx, sy, sw, sh, 0, 0, sigSize, sigSize);
    const data = tCtx.getImageData(0, 0, sigSize, sigSize).data;
    const sig = new Float32Array(sigSize * sigSize);
    for (let i = 0; i < sigSize * sigSize; i++) {
      sig[i] = (data[i*4]*77 + data[i*4+1]*150 + data[i*4+2]*29) / (255*256);
    }
    return sig;
  }

  // Try multiple crops of the uploaded photo and find best matching logo
  async function match(file) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const cv = document.getElementById('work-cv');
        // Scale image for processing
        const maxDim = 600;
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const W = Math.round(img.width * scale);
        const H = Math.round(img.height * scale);
        cv.width = W; cv.height = H;
        const ctx = cv.getContext('2d');
        ctx.drawImage(img, 0, 0, W, H);
        URL.revokeObjectURL(url);

        const refs = getRefSigs();
        const SIG_SIZE = 64;

        // Generate candidate regions: full image + crops at multiple positions/scales
        const candidates = [];

        // Try square crops (logos are roughly square)
        const minDim = Math.min(W, H);
        for (const frac of [1.0, 0.85, 0.7, 0.55]) {
          const cropSize = Math.floor(minDim * frac);
          // Center + 4 quadrant offsets
          const offsets = [
            { x: Math.floor((W - cropSize) / 2), y: Math.floor((H - cropSize) / 2) }, // center
            { x: 0, y: 0 }, // top-left
            { x: W - cropSize, y: 0 }, // top-right
            { x: 0, y: H - cropSize }, // bottom-left
            { x: W - cropSize, y: H - cropSize }, // bottom-right
          ];
          for (const { x, y } of offsets) {
            if (x >= 0 && y >= 0 && x + cropSize <= W && y + cropSize <= H) {
              candidates.push({ x, y, w: cropSize, h: cropSize });
            }
          }
        }

        // Also try non-square regions for logos that might be photographed wider
        candidates.push({ x: 0, y: 0, w: W, h: H }); // full
        const mh = Math.floor(H * 0.8), my = Math.floor(H * 0.1);
        const mw = Math.floor(W * 0.8), mx = Math.floor(W * 0.1);
        candidates.push({ x: mx, y: my, w: mw, h: mh }); // center 80%

        let bestScore = 0;
        let bestStation = null;

        for (const { x, y, w, h } of candidates) {
          const sig = regionToSig(ctx, x, y, w, h, SIG_SIZE);
          for (const { station, sig: refSig } of refs) {
            const score = LogoEngine.correlate(sig, refSig);
            if (score > bestScore) {
              bestScore = score;
              bestStation = station;
            }
          }
        }

        if (bestScore >= 0.72) {
          resolve({ station: bestStation, score: bestScore, matched: true });
        } else {
          resolve({
            station: bestStation,
            score: bestScore,
            matched: false,
            reason: bestScore > 0.4
              ? `Best match: ${bestStation?.id} at ${Math.round(bestScore * 100)}% confidence — below 72% threshold`
              : 'No logo pattern found in this photo'
          });
        }
      };
      img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
      img.src = url;
    });
  }

  return { match };
})();

        <div style="font-size:10px;color:var(--ink3);font-family:'JetBrains Mono',monospace">confidence: ${Math.round(mr.score*100)}%</div>

  return`

    <button class="btn btn-blk" style="background:var(--red);margin-bottom:8px" onclick="resetScan()">📸 Try Again</button>
    <button class="btn btn-out" onclick="openManual()">🎨 Select Station Manually</button>
  </div>`;
}

function onDrop(e){
  e.preventDefault();document.getElementById('dz')?.classList.remove('drag');
  const f=e.dataTransfer?.files?.[0];
  if(f?.type.startsWith('image/')){S.file=f;S.matchResult=null;render();loadPrev(f)}
}
function onFile(e){const f=e.target?.files?.[0];if(f){S.file=f;S.matchResult=null;render();loadPrev(f)}}
function loadPrev(file){
  setTimeout(()=>{
    const img=document.getElementById('prev-img');if(!img)return;
    const url=URL.createObjectURL(file);img.onload=()=>URL.revokeObjectURL(url);img.src=url;
  },20);
}
function resetScan(){S.file=null;S.matchResult=null;S.matchLoading=false;render()}

async function runMatch(){
  if(!S.file)return;
  S.matchLoading=true;render();
  try{
    const result=await PhotoMatcher.match(S.file);
    S.matchResult=result;S.matchLoading=false;render();
    if(result?.matched)toast('✅ Matched '+result.station.id+'!');
    else toast('No match — try a clearer photo',true);
  }catch(err){
    S.matchLoading=false;
    S.matchResult={matched:false,score:0,reason:'Processing error — please try again'};render();
  }
}

function entryNext(){

      </div>

    </div>`).join('');

  // Draw all canvases synchronously
  LogoEngine.STATIONS.forEach(st => {
    const cv = document.getElementById('prt-cv-' + st.id);
    if(cv) LogoEngine.render(st, cv, LOGO_SIZE);
  });

  // Small delay to ensure canvas pixels are committed, then print
  setTimeout(() => window.print(), 120);
}
